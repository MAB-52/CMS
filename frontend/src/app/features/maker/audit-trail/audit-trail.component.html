<div class="wrap">
  <div class="top">
    <div>
      <div class="eyebrow">Activity</div>
      <h1>Audit Trail</h1>
    </div>
    <a mat-stroked-button routerLink="/maker/dashboard">Back to Dashboard</a>
  </div>

  <mat-card>
    <mat-card-content>
      <div class="table-wrap">
        <table mat-table [dataSource]="rows" class="tbl">
          <ng-container matColumnDef="action">
            <th mat-header-cell *matHeaderCellDef>Action</th>
            <td mat-cell *matCellDef="let row">{{ row.action }}</td>
          </ng-container>
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Description</th>
            <td mat-cell *matCellDef="let row">{{ row.description }}</td>
          </ng-container>
          <ng-container matColumnDef="entity">
            <th mat-header-cell *matHeaderCellDef>Entity</th>
            <td mat-cell *matCellDef="let row">{{ row.entityName }}</td>
          </ng-container>
          <ng-container matColumnDef="when">
            <th mat-header-cell *matHeaderCellDef>Performed</th>
            <td mat-cell *matCellDef="let row" [matTooltip]="row.performedAt">{{ row.performedAt | timeAgo }}</td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
      <div class="pager">
        <button mat-stroked-button type="button" [disabled]="page === 0" (click)="prev()">Previous</button>
        <span>Page {{ page + 1 }}</span>
        <button mat-stroked-button type="button" [disabled]="!hasNext" (click)="next()">Next</button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
